<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZIN ST - Live Fix</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0d1117; color: white; padding: 20px; }
        .card { background: #161b22; padding: 20px; border-radius: 15px; border: 1px solid #30363d; max-width: 400px; margin: auto; }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 15px; }
        .btn { background: #238636; color: white; border: none; padding: 15px; cursor: pointer; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; }
        .status { color: #8b949e; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>AZIN ST Control</h2>
    
    <button id="genBtn" class="btn" style="background: #1f6feb;" onclick="generateLink()">1. Naya Link Banayein</button>
    
    <div id="link-box" style="display:none; margin-top:10px;">
        <input type="text" id="urlInp" style="width:80%; padding:8px; border-radius:5px; border:none;" readonly>
        <button class="btn" onclick="copyLink()">Copy</button>
    </div>

    <div id="join-box" style="display:none;">
        <p>Invite Mila Hai!</p>
        <button class="btn" onclick="startApp()">Connect Now</button>
    </div>

    <p class="status" id="stText">Status: Ready</p>
    <video id="remoteView" autoplay playsinline></video>
</div>

<script>
    const peer = new Peer();
    const urlParams = new URLSearchParams(window.location.search);
    const joinID = urlParams.get('join');

    peer.on('open', id => {
        if(joinID) {
            document.getElementById('join-box').style.display = 'block';
            document.getElementById('genBtn').style.display = 'none';
        }
    });

    function generateLink() {
        const link = window.location.href.split('?')[0] + "?join=" + peer.id;
        document.getElementById('urlInp').value = link;
        document.getElementById('link-box').style.display = 'block';
    }

    function copyLink() {
        document.getElementById('urlInp').select();
        document.execCommand('copy');
        alert("Copied!");
    }

    async function startApp() {
        document.getElementById('stText').innerText = "Connecting...";
        try {
            // Mobile ke liye pehle Camera & Mic try karte hain (sabse stable)
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: true 
            });
            
            const call = peer.call(joinID, stream);
            
            call.on('stream', remStream => {
                document.getElementById('remoteView').srcObject = remStream;
                document.getElementById('stText').innerText = "Live Connected!";
            });

        } catch (err) {
            document.getElementById('stText').innerText = "Error: " + err.name;
            console.error(err);
            alert("Bhai, permission popup aane par 'Allow' zaroori hai!");
        }
    }

    peer.on('call', async call => {
        // Dusre side se bhi mic enable karein baat karne ke liye
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        call.answer(stream);
        call.on('stream', remStream => {
            document.getElementById('remoteView').srcObject = remStream;
            document.getElementById('stText').innerText = "Live!";
        });
    });
</script>

</body>
</html>
