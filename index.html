<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZIN ST - Live Remote</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --bg: #000; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }
        
        /* UI Container */
        .setup-container { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card); padding: 30px; border-radius: 20px; 
            width: 85%; max-width: 400px; text-align: center; z-index: 100;
        }

        /* Live Video Style */
        #remote-video { 
            width: 100vw; height: 100vh; object-fit: contain; 
            display: none; background: #000;
        }

        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-copy { background: #22c55e; margin-top: 5px; font-size: 14px; }
        .link-box { background: #0f172a; padding: 10px; border-radius: 8px; margin: 15px 0; border: 1px dashed #3b82f6; word-break: break-all; color: #fbbf24; font-size: 12px; }

        /* Guidance Dot */
        .dot {
            position: absolute; width: 40px; height: 40px;
            background: rgba(255, 0, 0, 0.4); border: 2px solid red;
            border-radius: 50%; pointer-events: none; z-index: 1000;
            transform: translate(-50%, -50%); display: none;
        }
        .pulse { animation: pulse-ani 0.6s ease-out; }
        @keyframes pulse-ani {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="cursor-dot" class="dot"></div>

    <div id="setup-ui" class="setup-container">
        <h2 style="margin-top:0">AZIN ST Live</h2>
        <p id="status" style="font-size:14px; color:#94a3b8">Connecting...</p>
        
        <div id="master-side">
            <button class="btn" onclick="generateLink()">Link Generate Karein</button>
            <div id="link-area" class="hidden">
                <div class="link-box" id="copy-url"></div>
                <button class="btn btn-copy" onclick="copyLink()">Copy Link</button>
            </div>
        </div>

        <div id="target-side" class="hidden">
            <p>Wait karein, screen share chalu ho raha hai...</p>
        </div>
    </div>

    <video id="remote-video" autoplay playsinline muted></video>

    <script>
        const peer = new Peer();
        const video = document.getElementById('remote-video');
        const dot = document.getElementById('cursor-dot');
        let dataConn = null;

        peer.on('open', (id) => {
            document.getElementById('status').innerText = "System Ready ✅";
            window.myId = id;
        });

        function generateLink() {
            const link = window.location.href.split('?')[0] + "?connect=" + window.myId;
            document.getElementById('copy-url').innerText = link;
            document.getElementById('link-area').classList.remove('hidden');
        }

        function copyLink() {
            navigator.clipboard.writeText(document.getElementById('copy-url').innerText);
            alert("Link copy ho gaya!");
        }

        // Tap to Guide
        video.onclick = (e) => {
            if (dataConn) {
                const x = (e.clientX / window.innerWidth) * 100;
                const y = (e.clientY / window.innerHeight) * 100;
                dataConn.send({ x, y });
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const connectId = urlParams.get('connect');

        if (connectId) {
            // TARGET MOBILE
            document.getElementById('master-side').classList.add('hidden');
            document.getElementById('target-side').classList.remove('hidden');

            async function startLive() {
                try {
                    // Optimized Stream for Mobile
                    const stream = await navigator.mediaDevices.getDisplayMedia({
                        video: { frameRate: 30, cursor: "always" },
                        audio: true
                    });
                    
                    const call = peer.call(connectId, stream);
                    const conn = peer.connect(connectId);
                    
                    conn.on('data', (data) => {
                        dot.style.display = 'block';
                        dot.style.left = data.x + "%";
                        dot.style.top = data.y + "%";
                        dot.classList.remove('pulse');
                        void dot.offsetWidth;
                        dot.classList.add('pulse');
                    });

                    // Agar sharing band ho jaye toh reload
                    stream.getVideoTracks()[0].onended = () => location.reload();

                } catch (err) {
                    alert("Permission Denied! Settings mein 'Screen Recording' allow karein.");
                }
            }
            setTimeout(startLive, 2000);

        } else {
            // MASTER MOBILE (Aapka Mobile)
            peer.on('call', (call) => {
                call.answer(); 
                call.on('stream', (remoteStream) => {
                    document.getElementById('setup-ui').style.display = 'none';
                    video.style.display = 'block';
                    video.srcObject = remoteStream;
                    video.play(); // Force play
                });
            });

            peer.on('connection', (conn) => {
                dataConn = conn;
            });
        }
    </script>
</body>
</html>
