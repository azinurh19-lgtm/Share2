<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZIN ST - Remote Link</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 25px; border-radius: 15px; max-width: 450px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .btn { background: #3b82f6; border: none; padding: 15px; color: white; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .share-link { background: #334155; padding: 10px; border-radius: 5px; margin: 15px 0; font-size: 12px; color: #fbbf24; word-break: break-all; border: 1px dashed #fbbf24; }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 20px; border: 2px solid #3b82f6; }
        .status { color: #22c55e; font-size: 14px; margin-bottom: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card" id="main-ui">
        <h2>AZIN ST Remote Control</h2>
        <p class="status" id="status-msg">System Ready...</p>
        
        <div id="step-1">
            <button class="btn" onclick="generateRemoteLink()">Generate Support Link</button>
        </div>

        <div id="step-2" class="hidden">
            <p>Ise Target Mobile par bhejein:</p>
            <div class="share-link" id="link-text"></div>
            <p style="font-size: 12px;">Waiting for family member to click...</p>
        </div>

        <div id="step-3" class="hidden">
            <p>Target Mobile Connected!</p>
            <video id="remote-video" autoplay playsinline></video>
            <p style="font-size: 13px; color: #94a3b8;">Note: Browser control allow nahi karta, sirf dekh sakte hain aur baat kar sakte hain.</p>
        </div>
    </div>

    <script>
        let peer = new Peer();
        let myId = "";

        // Peer ID generate hote hi
        peer.on('open', (id) => {
            myId = id;
        });

        function generateRemoteLink() {
            if(!myId) return alert("System connect ho raha hai, wait karein...");
            
            // Current URL ke saath Peer ID attach karna
            const baseUrl = window.location.href.split('?')[0];
            const finalLink = `${baseUrl}?connectTo=${myId}`;
            
            document.getElementById('link-text').innerText = finalLink;
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('status-msg').innerText = "Link Generated!";
        }

        // Check karein kya ye link kisi target ne click kiya hai
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('connectTo');

        if (targetId) {
            // AGAR TARGET MOBILE HAI (Jisne link click kiya)
            document.getElementById('status-msg').innerText = "Connecting to Master...";
            document.getElementById('step-1').innerHTML = "<p>Connecting... Please allow Screen & Mic</p>";

            async function startStreaming() {
                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                    const call = peer.call(targetId, stream);
                    document.getElementById('step-1').innerHTML = "<h3>Sharing Live...</h3>";
                } catch (err) {
                    alert("Permission mandatory hai!");
                }
            }
            // Thoda wait karke screen mangna
            setTimeout(startStreaming, 1000);

        } else {
            // AGAR AAPKA MOBILE HAI (Master)
            peer.on('call', (call) => {
                call.answer(); // Answer without sending stream
                call.on('stream', (remoteStream) => {
                    document.getElementById('step-2').classList.add('hidden');
                    document.getElementById('step-3').classList.remove('hidden');
                    document.getElementById('remote-video').srcObject = remoteStream;
                    document.getElementById('status-msg').innerText = "Connected & Receiving...";
                });
            });
        }
    </script>
</body>
</html>
