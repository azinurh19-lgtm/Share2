<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZIN ST - Support Mode</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --accent: #ef4444; --bg: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; text-align: center; }
        
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: #1e293b; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .btn:active { transform: scale(0.98); }
        .btn-copy { background: #22c55e; margin-top: 5px; font-size: 14px; padding: 8px; }
        
        .link-box { background: #0f172a; padding: 12px; border-radius: 8px; margin: 15px 0; border: 1px dashed var(--primary); word-break: break-all; color: #fbbf24; font-size: 13px; }
        
        #remote-video { width: 100vw; height: 100vh; object-fit: contain; background: #000; display: none; }
        
        /* Red Dot Cursor */
        .dot {
            position: absolute;
            width: 35px;
            height: 35px;
            background: rgba(239, 68, 68, 0.5);
            border: 2px solid var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            display: none;
        }
        .pulse { animation: pulse-ani 0.7s ease-out; }
        @keyframes pulse-ani {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="cursor-dot" class="dot"></div>

    <div id="setup-ui" class="container">
        <div class="card">
            <h2 style="color:var(--primary)">AZIN ST Support</h2>
            <p id="status-text" style="color:#94a3b8">Server se connect ho raha hai...</p>
            
            <div id="master-controls">
                <button class="btn" onclick="generateLink()">Guide Link Banayein</button>
                <div id="link-section" class="hidden">
                    <div class="link-box" id="final-url"></div>
                    <button class="btn btn-copy" onclick="copyText()">Copy Link</button>
                    <p style="font-size: 12px; margin-top: 10px;">Link WhatsApp karein aur isi page par rukein.</p>
                </div>
            </div>

            <div id="target-controls" class="hidden">
                <h3>Connecting...</h3>
                <p>Kripya Screen Share allow karein taaki hum aapki madad kar sakein.</p>
            </div>
        </div>
    </div>

    <video id="remote-video" autoplay playsinline></video>

    <script>
        const peer = new Peer();
        const videoElement = document.getElementById('remote-video');
        const statusText = document.getElementById('status-text');
        const dotElement = document.getElementById('cursor-dot');
        let dataConnection = null;

        peer.on('open', (id) => {
            statusText.innerText = "System Ready ✅";
            window.myPeerId = id;
        });

        function generateLink() {
            const baseUrl = window.location.href.split('?')[0];
            const fullLink = `${baseUrl}?guideId=${window.myPeerId}`;
            document.getElementById('final-url').innerText = fullLink;
            document.getElementById('link-section').classList.remove('hidden');
        }

        function copyText() {
            const url = document.getElementById('final-url').innerText;
            navigator.clipboard.writeText(url);
            alert("Link copy ho gaya!");
        }

        // Tap/Click Position bhejna
        videoElement.onclick = function(e) {
            if (dataConnection) {
                const rect = videoElement.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                dataConnection.send({ x, y });
            }
        };

        // URL Check
        const urlParams = new URLSearchParams(window.location.search);
        const guideId = urlParams.get('guideId');

        if (guideId) {
            // TARGET MOBILE LOGIC
            document.getElementById('master-controls').classList.add('hidden');
            document.getElementById('target-controls').classList.remove('hidden');

            async function startTargetStream() {
                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                    peer.call(guideId, stream);
                    
                    // Master se data connect karna cursor ke liye
                    const conn = peer.connect(guideId);
                    conn.on('data', (data) => {
                        dotElement.style.display = 'block';
                        dotElement.style.left = data.x + "%";
                        dotElement.style.top = data.y + "%";
                        dotElement.classList.remove('pulse');
                        void dotElement.offsetWidth; // Trigger reflow
                        dotElement.classList.add('pulse');
                    });
                } catch (err) {
                    alert("Permission Denied! Browser settings check karein.");
                }
            }
            setTimeout(startTargetStream, 1500);

        } else {
            // MASTER MOBILE LOGIC
            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (remoteStream) => {
                    document.getElementById('setup-ui').classList.add('hidden');
                    videoElement.style.display = 'block';
                    videoElement.srcObject = remoteStream;
                });
            });

            peer.on('connection', (conn) => {
                dataConnection = conn;
            });
        }

        peer.on('error', (err) => {
            console.error(err);
            statusText.innerText = "Error: Connection lost.";
        });
    </script>
</body>
</html>
