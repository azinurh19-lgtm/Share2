<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZIN ST - Pro Remote</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; text-align: center; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: #161b22; border-radius: 20px; padding: 20px; border: 1px solid #30363d; }
        video { width: 100%; border-radius: 15px; background: #000; margin-top: 15px; transform: scaleX(1); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; color: white; }
        .btn-blue { background: #1f6feb; width: 100%; margin-bottom: 10px; }
        .btn-green { background: #238636; }
        .btn-red { background: #da3633; }
        .status-bar { font-size: 13px; color: #8b949e; margin: 10px 0; padding: 8px; background: #0d1117; border-radius: 5px; }
        #link-section { display: none; background: #0d1117; padding: 10px; border-radius: 10px; border: 1px dashed #58a6ff; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>AZIN ST Control Panel</h2>
    
    <div id="setup-section">
        <button class="btn btn-blue" onclick="generateLink()">Link Generate Karein</button>
        <div id="link-section">
            <p id="shareUrl" style="font-size: 11px; word-break: break-all; color: #58a6ff;"></p>
            <button class="btn btn-green" onclick="copyLink()">Copy Link</button>
        </div>
    </div>

    <div id="join-section" style="display: none;">
        <button class="btn btn-blue" onclick="startRemote('screen')">Share Screen</button>
        <button class="btn btn-green" onclick="startRemote('camera')">Share Camera</button>
    </div>

    <div class="status-bar" id="status">Status: Waiting...</div>
    
    <video id="remoteVideo" autoplay playsinline></video>

    <div class="controls" id="remoteControls" style="display: none;">
        <button class="btn btn-blue" onclick="switchCamera()">Switch Camera</button>
        <button id="micBtn" class="btn btn-red" onclick="toggleMic()">Mute Mic</button>
    </div>
</div>

<script>
    const peer = new Peer();
    let currentStream;
    let useBackCamera = false;
    const urlParams = new URLSearchParams(window.location.search);
    const joinID = urlParams.get('join');

    peer.on('open', id => {
        if(joinID) {
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('join-section').style.display = 'block';
            document.getElementById('status').innerText = "Status: Connected to Server";
        }
    });

    function generateLink() {
        const link = window.location.href.split('?')[0] + "?join=" + peer.id;
        document.getElementById('shareUrl').innerText = link;
        document.getElementById('link-section').style.display = 'block';
    }

    function copyLink() {
        navigator.clipboard.writeText(document.getElementById('shareUrl').innerText);
        alert("Link Copied!");
    }

    async function startRemote(type) {
        try {
            document.getElementById('status').innerText = "Accessing " + type + "...";
            let stream;
            
            if(type === 'screen') {
                stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            } else {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: useBackCamera ? "environment" : "user" }, 
                    audio: true 
                });
            }
            
            currentStream = stream;
            const call = peer.call(joinID, stream);
            document.getElementById('remoteControls').style.display = 'grid';
            handleStream(call);
        } catch (err) {
            alert("Permission Denied!");
            document.getElementById('status').innerText = "Error: " + err.name;
        }
    }

    function handleStream(call) {
        call.on('stream', remoteStream => {
            document.getElementById('remoteVideo').srcObject = remoteStream;
            document.getElementById('status').innerText = "Live Streaming...";
        });
    }

    peer.on('call', async call => {
        const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        call.answer(audioStream);
        handleStream(call);
        document.getElementById('remoteControls').style.display = 'grid';
    });

    // Control Functions
    async function switchCamera() {
        if (!currentStream) return;
        useBackCamera = !useBackCamera;
        
        // Stop old tracks
        currentStream.getTracks().forEach(track => track.stop());
        
        // Start with new camera
        const newStream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: useBackCamera ? "environment" : "user" }, 
            audio: true 
        });
        
        currentStream = newStream;
        // Re-call logic would go here, but for now it updates local view
        // PeerJS re-negotiation is complex, so simple refresh is better for prototype
        alert("Camera switched. Please restart stream for remote view.");
    }

    function toggleMic() {
        const audioTrack = currentStream.getAudioTracks()[0];
        if (audioTrack.enabled) {
            audioTrack.enabled = false;
            document.getElementById('micBtn').innerText = "Unmute Mic";
            document.getElementById('micBtn').style.background = "#238636";
        } else {
            audioTrack.enabled = true;
            document.getElementById('micBtn').innerText = "Mute Mic";
            document.getElementById('micBtn').style.background = "#da3633";
        }
    }
</script>

</body>
</html>
