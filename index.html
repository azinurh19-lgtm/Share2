<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZIN ST - Final Fix</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0b0e14; color: white; text-align: center; padding: 10px; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 15px; max-width: 450px; margin: auto; }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 15px; height: 250px; object-fit: cover; }
        .btn { background: #238636; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .status { font-size: 12px; color: #8b949e; margin: 10px 0; }
        #remoteControls { display: none; margin-top: 10px; gap: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h2>AZIN ST Pro</h2>
    
    <div id="host-ui">
        <button class="btn" style="background:#1f6feb;" onclick="makeLink()">Generate Link</button>
        <p id="linkDisplay" style="font-size:10px; word-break:break-all; margin-top:10px; color:#58a6ff;"></p>
    </div>

    <div id="join-ui" style="display:none;">
        <button class="btn" onclick="startStream('screen')">Share Mobile Screen</button>
        <button class="btn" style="background:#8957e5;" onclick="startStream('camera')">Open Camera</button>
    </div>

    <p class="status" id="status">Status: Connecting to PeerServer...</p>
    
    <video id="v-view" autoplay playsinline></video>
</div>

<script>
    // Google STUN Servers jo connection ko block hone se bachate hain
    const peerConfig = {
        config: {
            'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' }
            ]
        }
    };

    const peer = new Peer(peerConfig);
    const urlParams = new URLSearchParams(window.location.search);
    const joinID = urlParams.get('join');

    peer.on('open', id => {
        document.getElementById('status').innerText = "Status: Online";
        if(joinID) {
            document.getElementById('host-ui').style.display = 'none';
            document.getElementById('join-ui').style.display = 'block';
        }
    });

    function makeLink() {
        const link = window.location.href.split('?')[0] + "?join=" + peer.id;
        document.getElementById('linkDisplay').innerText = link;
        navigator.clipboard.writeText(link);
        alert("Link Copy Ho Gaya!");
    }

    async function startStream(mode) {
        try {
            let stream;
            if(mode === 'screen') {
                stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            } else {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            }

            const call = peer.call(joinID, stream);
            document.getElementById('status').innerText = "Streaming...";

            call.on('stream', remoteStream => {
                document.getElementById('v-view').srcObject = remoteStream;
            });
        } catch (e) {
            alert("Error: " + e.message);
        }
    }

    peer.on('call', async call => {
        // Answer with Mic to enable two-way talk
        const mic = await navigator.mediaDevices.getUserMedia({ audio: true });
        call.answer(mic);
        call.on('stream', remoteStream => {
            document.getElementById('v-view').srcObject = remoteStream;
            document.getElementById('status').innerText = "Live Connected!";
        });
    });
</script>

</body>
</html>
