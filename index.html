<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZIN ST - Remote Support</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); width: 90%; max-width: 500px; text-align: center; }
        h2 { color: var(--primary); margin-bottom: 10px; }
        .status-dot { height: 10px; width: 10px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.3s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-red { background: #ef4444; }
        .link-box { background: #334155; padding: 15px; border-radius: 8px; margin: 20px 0; border: 1px dashed var(--primary); word-break: break-all; font-family: monospace; color: #fbbf24; cursor: pointer; }
        #remote-video { width: 100%; border-radius: 12px; border: 2px solid #334155; margin-top: 20px; background: #000; display: none; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h2>AZIN ST Remote</h2>
        <div id="connection-status"><span class="status-dot"></span> Server Se Connect Ho Raha Hai...</div>
        
        <div id="master-view">
            <p style="font-size: 14px; color: #94a3b8;">Link generate karke family member ko bhejein</p>
            <button class="btn" id="gen-btn" onclick="generateLink()">Link Generate Karein</button>
            <div id="link-area" style="display: none;">
                <div class="link-box" id="shareable-link" onclick="copyLink()"></div>
                <p style="font-size: 12px;">Link par click karte hi connection shuru ho jayega.</p>
            </div>
        </div>

        <div id="video-area">
            <video id="remote-video" autoplay playsinline controls></video>
            <div id="loading" class="loader"></div>
            <button id="hangup" class="btn btn-red" style="display: none;" onclick="location.reload()">Connection Kaatein</button>
        </div>
    </div>

    <script>
        const peer = new Peer();
        const videoEl = document.getElementById('remote-video');
        const loader = document.getElementById('loading');
        const statusMsg = document.getElementById('connection-status');
        let myId = "";

        // 1. Peer ID milne par
        peer.on('open', (id) => {
            myId = id;
            statusMsg.innerHTML = '<span class="status-dot"></span> System Ready';
        });

        // 2. Link Generation Logic
        function generateLink() {
            const url = window.location.href.split('?')[0];
            const link = `${url}?partner=${myId}`;
            document.getElementById('shareable-link').innerText = link;
            document.getElementById('link-area').style.display = 'block';
            document.getElementById('gen-btn').style.display = 'none';
        }

        function copyLink() {
            const text = document.getElementById('shareable-link').innerText;
            navigator.clipboard.writeText(text);
            alert("Link copy ho gaya! Ab ise WhatsApp karein.");
        }

        // 3. Connection Handling
        const urlParams = new URLSearchParams(window.location.search);
        const partnerId = urlParams.get('partner');

        if (partnerId) {
            // --- TARGET MOBILE LOGIC ---
            document.getElementById('master-view').innerHTML = "<h3>Connecting to Master...</h3><p>Kripya Screen Share allow karein.</p>";
            
            async function startSharing() {
                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({ 
                        video: true, 
                        audio: true 
                    });
                    peer.call(partnerId, stream);
                    document.getElementById('master-view').innerHTML = "<h3>Sharing Live... ✅</h3>";
                } catch (err) {
                    alert("Permission Error: Screen share allow karna zaroori hai.");
                }
            }
            setTimeout(startSharing, 1500);

        } else {
            // --- MASTER MOBILE LOGIC (Aapka Phone) ---
            peer.on('call', (call) => {
                statusMsg.innerText = "Connecting...";
                loader.style.display = "block";
                
                call.answer(); // Stream receive karna
                call.on('stream', (remoteStream) => {
                    loader.style.display = "none";
                    videoEl.style.display = "block";
                    document.getElementById('hangup').style.display = "block";
                    document.getElementById('master-view').style.display = "none";
                    videoEl.srcObject = remoteStream;
                    statusMsg.innerText = "Connected: Viewing Remote Mobile";
                });
            });
        }

        peer.on('error', (err) => {
            console.error(err);
            alert("Connection fail ho gaya. Dono taraf internet check karein.");
        });
    </script>
</body>
</html>
