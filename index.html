<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZIN ST - Guide Mode</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #ef4444; --bg: #0f172a; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }
        .setup-box { padding: 20px; text-align: center; background: #1e293b; border-radius: 15px; margin: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        /* Red Dot Animation */
        .cursor-dot {
            position: absolute;
            width: 30px;
            height: 30px;
            background: rgba(239, 68, 68, 0.6);
            border: 2px solid #ff0000;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            display: none;
        }
        .dot-pulse {
            animation: pulse 0.6s ease-out;
        }
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }

        #remote-video { width: 100vw; height: 100vh; object-fit: contain; background: black; display: none; cursor: crosshair; }
        .btn { background: #3b82f6; border: none; padding: 15px; color: white; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; }
        .link-display { background: #334155; padding: 10px; margin: 10px 0; font-size: 11px; color: #fbbf24; border-radius: 5px; word-break: break-all; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="guider-dot" class="cursor-dot"></div>

    <div id="ui-container" class="setup-box">
        <h2>AZIN ST Guide</h2>
        <p id="status">Connecting to server...</p>
        
        <div id="master-panel">
            <button class="btn" id="gen-btn" onclick="generateLink()">Guide Link Banayein</button>
            <div id="link-box" class="hidden">
                <div class="link-display" id="url-text"></div>
                <p>Ise WhatsApp karein aur isi page par ruke rahein.</p>
            </div>
        </div>
    </div>

    <video id="remote-video" autoplay playsinline></video>

    <script>
        const peer = new Peer();
        const videoEl = document.getElementById('remote-video');
        const dot = document.getElementById('guider-dot');
        let dataConn = null;

        peer.on('open', id => {
            document.getElementById('status').innerText = "System Ready ✅";
            window.myId = id;
        });

        function generateLink() {
            const link = window.location.href.split('?')[0] + "?guide=" + window.myId;
            document.getElementById('url-text').innerText = link;
            document.getElementById('link-box').classList.remove('hidden');
            document.getElementById('gen-btn').classList.add('hidden');
        }

        // --- Logic for Master (Aapka Mobile) ---
        videoEl.onclick = function(e) {
            if (dataConn) {
                // Percentage mein position bhejna taaki har screen size par sahi dikhe
                const x = (e.clientX / window.innerWidth) * 100;
                const y = (e.clientY / window.innerHeight) * 100;
                dataConn.send({ x, y });
            }
        };

        // --- Connection Handling ---
        const params = new URLSearchParams(window.location.search);
        const guideId = params.get('guide');

        if (guideId) {
            // TARGET MOBILE (Family Member)
            document.getElementById('ui-container').innerHTML = "<h3>Guiding Mode Active</h3><p>Screen share allow karein...</p>";
            
            async function startTarget() {
                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                    peer.call(guideId, stream);
                    
                    // Data receive karne ke liye connection
                    const conn = peer.connect(guideId);
                    conn.on('data', data => {
                        // Red Dot dikhana
                        dot.style.display = 'block';
                        dot.style.left = data.x + "%";
                        dot.style.top = data.y + "%";
                        dot.classList.remove('dot-pulse');
                        void dot.offsetWidth; // Reset animation
                        dot.classList.add('dot-pulse');
                    });
                } catch (err) { alert("Permission Denied!"); }
            }
            setTimeout(startTarget, 1000);

        } else {
            // MASTER MOBILE (Aapka Phone)
            peer.on('call', call => {
                call.answer();
                call.on('stream', stream => {
                    document.getElementById('ui-container').style.display = 'none';
                    videoEl.style.display = 'block';
                    videoEl.srcObject = stream;
                });
            });

            peer.on('connection', conn => {
                dataConn = conn; // Pointer data bhejne ke liye
            });
        }
    </script>
</body>
</html>
